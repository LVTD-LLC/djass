name: CLI Release

on:
  push:
    tags:
      - "cli/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.mod

      - name: Test CLI
        working-directory: cli
        run: go test ./...

      - name: Vet CLI
        working-directory: cli
        run: go vet ./...

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#cli/}"
          mkdir -p build dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            archive_arch="$arch"
            if [[ "$arch" == "amd64" ]]; then archive_arch="x86_64"; fi
            output_dir="build/${os}-${arch}"
            mkdir -p "$output_dir"
            binary="djass"
            if [[ "$os" == "windows" ]]; then binary="djass.exe"; fi
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -C cli \
              -ldflags="-s -w -X main.version=${version}" \
              -o "../${output_dir}/${binary}" \
              ./cmd/djass
            case "$os" in
              darwin) archive_os="Darwin" ;;
              linux) archive_os="Linux" ;;
              windows) archive_os="Windows" ;;
            esac
            archive="djass_${version}_${archive_os}_${archive_arch}"
            if [[ "$os" == "windows" ]]; then
              (cd "$output_dir" && zip -q "../../dist/${archive}.zip" "$binary")
            else
              tar -C "$output_dir" -czf "dist/${archive}.tar.gz" "$binary"
            fi
          done
          (cd dist && sha256sum * > checksums.txt)

      - name: Publish GitHub release
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
