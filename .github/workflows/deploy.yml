name: Deploy Prod

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/lvtd-llc/djass

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: deployment/Dockerfile
          tags: ${{ env.IMAGE_NAME }}

      - name: Deploy server to CapRover
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: djass
          token: ${{ secrets.APP_TOKEN }}
          image: ${{ env.IMAGE_NAME }}

      # The workers app uses the same image and must set DJASS_PROCESS_TYPE=worker in CapRover.
      - name: Deploy workers to CapRover
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: djass-workers
          token: ${{ secrets.WORKERS_APP_TOKEN }}
          image: ${{ env.IMAGE_NAME }}
