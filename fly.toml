# Fly.io app configuration for Djass.
# App names are globally unique. If this name is unavailable, create another app
# and update both `app` and `SITE_URL` below.

app = "djass"
primary_region = "iad"
console_command = "python manage.py shell"

[build]
  dockerfile = "deployment/Dockerfile"

[deploy]
  release_command = "python manage.py migrate --noinput"
  release_command_timeout = "10m"
  wait_timeout = "10m"

[env]
  DEBUG = "False"
  ENVIRONMENT = "prod"
  PORT = "8080"
  SITE_URL = "https://djass.fly.dev"
  ALLOW_SIGNUPS = "True"
  REDIS_DB = "0"

[processes]
  web = "sh deployment/entrypoint.sh -s"
  worker = "sh deployment/entrypoint.sh -w"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/healthcheck"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
