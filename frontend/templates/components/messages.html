{% if messages %}
<div class="fixed right-4 top-4 z-50 space-y-3" data-messages-container>
  {% for message in messages %}
    <div data-message-item data-message-id="{{ forloop.counter }}" class="dj-alert {% if message.tags == 'error' %}dj-alert-danger{% else %}dj-alert-success{% endif %} max-w-sm translate-x-full opacity-0 shadow-lg transition-all duration-300 ease-in-out">
      <div class="flex items-start">
        <div class="mr-3 flex-shrink-0">
          <svg class="h-5 w-5" viewBox="0 0 24 24">
            <circle class="text-[var(--dj-border-strong)]" stroke-width="2" stroke="currentColor" fill="transparent" r="10" cx="12" cy="12"/>
            <circle class="{% if message.tags == 'error' %}text-[var(--dj-danger)]{% else %}text-[var(--dj-success)]{% endif %}" stroke-width="2" stroke="currentColor" fill="transparent" r="10" cx="12" cy="12" data-timer-circle/>
          </svg>
        </div>
        <div class="flex-grow">
          <p class="text-sm text-[var(--dj-heading)]">{{ message }}</p>
        </div>
        <div class="ml-3 flex-shrink-0">
          <button data-message-dismiss type="button" class="dj-icon-button h-6 w-6" aria-label="Dismiss">
            <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
{% endif %}
