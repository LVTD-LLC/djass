{% if not email_verified %}
  <div class="dj-alert dj-alert-warning mb-4">
    <div class="flex gap-3">
      <div class="mt-0.5 flex-shrink-0">
        <svg class="h-5 w-5 text-[var(--dj-warning)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd" d="M8.485 3.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 3.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
        </svg>
      </div>
      <div>
        <h2 class="text-sm font-semibold text-[var(--dj-heading)]">Attention</h2>
        <form method="post" action="{{ resend_confirmation_url }}" class="mt-2 text-sm leading-6 text-[var(--dj-muted)]">
          {% csrf_token %}
          <p>Your email is not yet confirmed. This will limit the available functionality.</p>
          <p>
            You should have received a confirmation code by email. If you haven't received it,
            <button type="submit" class="font-semibold text-[var(--dj-warning)] underline">click here to resend</button>.
          </p>
        </form>
      </div>
    </div>
  </div>
{% endif %}
