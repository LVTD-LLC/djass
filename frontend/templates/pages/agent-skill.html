{% extends "base_app.html" %}

{% block content %}
  <section class="pb-16 pt-8">
    <div class="dj-container">
      <div class="dj-panel p-6 sm:p-8">
        <div class="flex flex-col gap-5 md:flex-row md:items-start md:justify-between">
          <div>
            <p class="dj-kicker">Agent workflow</p>
            <h1 class="mt-3 text-4xl font-semibold text-[var(--dj-heading)]">Djass Agent Skill</h1>
            <p class="mt-3 max-w-2xl text-sm leading-6 text-[var(--dj-muted)]">
              Reusable instructions for agents that support skill files.
            </p>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <a href="{% url 'home' %}" class="dj-button dj-button-secondary">Dashboard</a>
            <a href="{% url 'docs_page' category='api' page='projects-api-v1' %}" class="dj-button dj-button-secondary">API docs</a>
          </div>
        </div>

        <div class="mt-8 rounded-lg border border-[var(--dj-border)] bg-[var(--dj-panel-solid)] p-4" data-controller="clipboard">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <label for="djass-skill-md" class="block text-sm font-semibold text-[var(--dj-heading)]">SKILL.md</label>
              <p class="mt-1 text-xs text-[var(--dj-muted)]">Copy this into your agent's skill directory.</p>
            </div>
            <div class="flex items-center gap-3">
              <p class="text-sm font-medium text-[var(--dj-success)]" data-clipboard-target="status" aria-live="polite"></p>
              <button type="button" data-action="clipboard#copy" class="dj-button dj-button-primary">
                Copy SKILL.md
              </button>
            </div>
          </div>
          <textarea
            id="djass-skill-md"
            readonly
            spellcheck="false"
            data-clipboard-target="source"
            class="dj-input mt-3 h-[40rem] w-full resize-y p-4 font-mono text-xs leading-5"
          >{{ djass_agent_skill_md }}</textarea>
        </div>
      </div>
    </div>
  </section>
{% endblock content %}
