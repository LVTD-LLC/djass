{% extends "base_app.html" %}

{% block content %}
<div class="isolate relative mt-12 px-6 lg:px-8">
  <div class="mx-auto max-w-5xl space-y-6">
    <section class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-gray-900">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-gray-100">Create project</h1>
          <p class="mt-2 text-gray-600 dark:text-gray-300">Configure your starter and queue generation.</p>
        </div>
        <a href="{% url 'home' %}" class="text-sm font-semibold text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-gray-100">Back to dashboard</a>
      </div>

      <form method="post" action="{% url 'project_create' %}" class="mt-6 grid grid-cols-1 gap-4 md:grid-cols-2">
        {% csrf_token %}
        {% for field in project_form %}
          <div>
            <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}<p class="mt-1 text-xs text-gray-500 dark:text-gray-400">{{ field.help_text }}</p>{% endif %}
          </div>
        {% endfor %}
        <div class="md:col-span-2">
          <button type="submit" class="inline-flex items-center rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-500">
            Create Project
          </button>
        </div>
      </form>
    </section>
  </div>
</div>
{% endblock content %}
