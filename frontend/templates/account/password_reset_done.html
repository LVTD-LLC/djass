{% extends 'base_landing.html' %}

{% block content %}
  <div class="dj-auth-wrap">
    <div class="dj-auth-card text-center">
      <p class="dj-pill dj-pill-success mx-auto">Sent</p>
      <h1 class="mt-5 text-3xl font-semibold text-[var(--dj-heading)]">Check your email</h1>
      <p class="mt-4 text-sm leading-6 text-[var(--dj-muted)]">
        We've sent you an email with a link to reset your password. Please check your inbox and follow the instructions.
      </p>
      <p class="mt-2 text-sm text-[var(--dj-soft)]">If you don't see the email, please check your spam folder.</p>
      <a href="{% url 'account_login' %}" class="dj-button dj-button-primary mt-8">Back to sign in</a>
    </div>
  </div>
{% endblock content %}
