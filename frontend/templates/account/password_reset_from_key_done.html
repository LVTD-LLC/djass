{% extends 'base_landing.html' %}

{% block content %}
  <div class="dj-auth-wrap">
    <div class="dj-auth-card text-center">
      <p class="dj-pill dj-pill-success mx-auto">Updated</p>
      <h1 class="mt-5 text-3xl font-semibold text-[var(--dj-heading)]">Password changed successfully</h1>
      <p class="mt-4 text-sm leading-6 text-[var(--dj-muted)]">
        Your password has been changed successfully. You can now sign in with your new password.
      </p>
      <a href="{% url 'account_login' %}" class="dj-button dj-button-primary mt-8">Sign in</a>
    </div>
  </div>
{% endblock content %}
